<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat — UnifiedMe AI</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css">
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/highlight.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@300;400;500;600;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;--surface:#14141f;--surface2:#1c1c2e;--surface3:#252540;
  --border:#2a2a45;--border-hover:#3d3d60;
  --text:#e8e8f0;--text-dim:#9090b0;--text-muted:#606080;
  --accent:#7c8cff;--accent-dim:#5a68d4;
  --green:#4ade80;--red:#f87171;--orange:#fbbf24;--cyan:#22d3ee;
  --thinking-bg:#1a1a30;--thinking-border:#3a3a60;
  --radius:10px;--radius-sm:6px;
}
html,body{height:100%}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);display:flex;overflow:hidden}
code,.mono{font-family:'JetBrains Mono',monospace}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* Layout */
.sidebar{width:260px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-header{padding:1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.sidebar-header h2{font-size:1rem;font-weight:600}
.sidebar-list{flex:1;overflow-y:auto;padding:.5rem}
.sidebar-item{padding:.6rem .8rem;border-radius:var(--radius-sm);cursor:pointer;font-size:.85rem;color:var(--text-dim);transition:all .15s;margin-bottom:2px;display:flex;align-items:center;justify-content:space-between}
.sidebar-item:hover{background:var(--surface2);color:var(--text)}
.sidebar-item.active{background:var(--surface3);color:var(--text);border:1px solid var(--border)}
.sidebar-item .del{opacity:0;font-size:.7rem;color:var(--red);cursor:pointer;padding:2px 5px}
.sidebar-item:hover .del{opacity:1}
.sidebar-footer{padding:.75rem;border-top:1px solid var(--border);display:flex;gap:.4rem;flex-wrap:wrap}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{display:flex;align-items:center;gap:.75rem;padding:.6rem 1.25rem;background:var(--surface);border-bottom:1px solid var(--border)}
.topbar select{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:.4rem .6rem;border-radius:var(--radius-sm);font-size:.82rem;font-family:'Inter',sans-serif}
.topbar .links{margin-left:auto;display:flex;gap:.5rem}
.topbar .links a{color:var(--text-dim);text-decoration:none;font-size:.78rem;padding:.3rem .6rem;border-radius:var(--radius-sm);border:1px solid var(--border)}
.topbar .links a:hover{color:var(--text);border-color:var(--border-hover)}

.messages{flex:1;overflow-y:auto;padding:1.5rem 2rem}
.msg{margin-bottom:1.5rem;max-width:900px;margin-left:auto;margin-right:auto}
.msg-user{display:flex;justify-content:flex-end}
.msg-user .msg-bubble{background:var(--accent-dim);color:#fff;border-radius:var(--radius) var(--radius) 4px var(--radius);padding:.75rem 1rem;max-width:75%;font-size:.9rem;line-height:1.6}
.msg-assistant .msg-bubble{background:var(--surface2);border:1px solid var(--border);border-radius:4px var(--radius) var(--radius) var(--radius);padding:1rem 1.25rem;font-size:.9rem;line-height:1.7}
.msg-thinking{margin-bottom:.5rem}
.msg-thinking .msg-bubble{background:var(--thinking-bg);border:1px solid var(--thinking-border);border-radius:var(--radius-sm);padding:.6rem 1rem;font-size:.82rem;color:var(--text-dim);font-style:italic;position:relative}
.msg-thinking .msg-bubble::before{content:'thinking';position:absolute;top:-.5rem;left:.75rem;background:var(--thinking-bg);padding:0 .4rem;font-size:.65rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em}

/* Markdown content */
.msg-bubble h1,.msg-bubble h2,.msg-bubble h3{margin:.75rem 0 .4rem;font-weight:600}
.msg-bubble h1{font-size:1.2rem}
.msg-bubble h2{font-size:1.05rem}
.msg-bubble h3{font-size:.95rem}
.msg-bubble p{margin:.4rem 0}
.msg-bubble ul,.msg-bubble ol{margin:.4rem 0 .4rem 1.5rem}
.msg-bubble li{margin:.2rem 0}
.msg-bubble a{color:var(--accent)}
.msg-bubble img{max-width:100%;border-radius:var(--radius-sm);margin:.5rem 0}
.msg-bubble blockquote{border-left:3px solid var(--border);padding-left:.75rem;color:var(--text-dim);margin:.5rem 0}

/* Code blocks */
.msg-bubble pre{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.75rem;margin:.5rem 0;overflow-x:auto;position:relative}
.msg-bubble pre code{font-size:.8rem;line-height:1.5}
.msg-bubble code:not(pre code){background:var(--surface3);padding:.15rem .4rem;border-radius:3px;font-size:.82rem}
.copy-code{position:absolute;top:.4rem;right:.4rem;background:var(--surface3);border:1px solid var(--border);color:var(--text-dim);padding:.2rem .5rem;border-radius:4px;font-size:.7rem;cursor:pointer;opacity:0;transition:opacity .15s}
pre:hover .copy-code{opacity:1}
.copy-code:hover{color:var(--text);border-color:var(--accent)}

/* Input area */
.input-area{padding:1rem 2rem 1.25rem;background:var(--surface);border-top:1px solid var(--border)}
.input-wrap{max-width:900px;margin:0 auto;display:flex;gap:.5rem;align-items:flex-end}
.input-wrap textarea{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);padding:.75rem 1rem;font-size:.9rem;font-family:'Inter',sans-serif;resize:none;min-height:44px;max-height:200px;line-height:1.5;outline:none;transition:border .15s}
.input-wrap textarea:focus{border-color:var(--accent)}
.input-wrap textarea::placeholder{color:var(--text-muted)}
.send-btn{background:var(--accent);border:none;color:#fff;width:40px;height:40px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.1rem;transition:background .15s;flex-shrink:0}
.send-btn:hover{background:var(--accent-dim)}
.send-btn:disabled{opacity:.4;cursor:not-allowed}
.upload-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text-dim);width:36px;height:36px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
.upload-btn:hover{border-color:var(--accent);color:var(--accent)}

/* Streaming indicator */
.streaming-dot{display:inline-block;width:6px;height:6px;background:var(--accent);border-radius:50%;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* Auth */
#auth-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999}
.auth-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:2rem;width:340px;text-align:center}
.auth-box h2{margin-bottom:1rem}
.auth-box input{width:100%;padding:.65rem .9rem;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:.9rem;outline:none;margin-bottom:.75rem}
.auth-box button{width:100%;padding:.65rem;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);font-size:.9rem;cursor:pointer}

.btn{display:inline-flex;align-items:center;gap:.3rem;padding:.35rem .65rem;border-radius:var(--radius-sm);font-size:.75rem;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text-dim);font-family:'Inter',sans-serif;transition:all .15s}
.btn:hover{border-color:var(--border-hover);color:var(--text)}
.btn-accent{background:var(--accent);border-color:var(--accent);color:#fff}

.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text-muted);gap:.5rem}
.empty-state h3{font-size:1.1rem;color:var(--text-dim)}
</style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-box">
    <h2>AI Chat</h2>
    <input type="password" id="auth-pw" placeholder="Admin password" autofocus>
    <button onclick="doLogin()">Login</button>
  </div>
</div>

<!-- Sidebar -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h2>Chats</h2>
    <button class="btn btn-accent" onclick="newChat()">+ New</button>
  </div>
  <div class="sidebar-list" id="session-list"></div>
  <div class="sidebar-footer">
    <button class="btn" onclick="exportChats()">Export</button>
    <button class="btn" onclick="importChats()">Import</button>
    <a href="/dashboard" class="btn">Dashboard</a>
    <a href="/explorer" class="btn">Explorer</a>
  </div>
</div>

<!-- Main -->
<div class="main" id="main-area" style="display:none">
  <div class="topbar">
    <select id="model-select" onchange="changeModel(this.value)"></select>
    <span id="stream-status" style="font-size:.75rem;color:var(--text-muted)"></span>
  </div>
  <div class="messages" id="messages">
    <div class="empty-state" id="empty-state">
      <h3>Start a conversation</h3>
      <p style="font-size:.85rem">Select a model and type a message</p>
    </div>
  </div>
  <div class="input-area">
    <div class="input-wrap">
      <label class="upload-btn" title="Upload file/image">
        +
        <input type="file" id="file-input" onchange="handleFileUpload(this)" style="display:none" multiple accept="image/*,.txt,.py,.js,.ts,.html,.css,.json,.md,.csv,.log">
      </label>
      <textarea id="msg-input" placeholder="Type a message... (Shift+Enter for newline)" rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()" title="Send">&#x27A4;</button>
    </div>
    <div id="file-preview" style="display:none;margin-top:.5rem;max-width:900px;margin-left:auto;margin-right:auto;font-size:.78rem;color:var(--text-dim)"></div>
  </div>
</div>

<input type="file" id="import-input" accept=".json" style="display:none" onchange="doImport(this)">

<script>
// ── State ──
var pw = '';
var sessions = [];
var currentSession = null;
var currentModel = 'claude-sonnet-4';
var isStreaming = false;
var pendingFiles = []; // [{name, type, content}]
var abortController = null;

// ── Auth ──
function doLogin() {
  var val = document.getElementById('auth-pw').value.trim();
  if (!val) return;
  pw = val;
  localStorage.setItem('chat_pw', val);
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('main-area').style.display = 'flex';
  init();
}
(function() {
  var saved = localStorage.getItem('chat_pw') || localStorage.getItem('admin_pw');
  if (saved) { pw = saved; document.getElementById('auth-screen').style.display = 'none'; document.getElementById('main-area').style.display = 'flex'; init(); }
  document.getElementById('auth-pw').addEventListener('keydown', function(e) { if (e.key === 'Enter') doLogin(); });
})();

function headers() { return { 'Authorization': 'Bearer ' + pw, 'Content-Type': 'application/json' }; }

async function api(path, opts) {
  var resp = await fetch(path, { ...opts, headers: { ...headers(), ...(opts && opts.headers || {}) } });
  if (resp.status === 401 || resp.status === 403) { localStorage.removeItem('chat_pw'); location.reload(); }
  return resp;
}

// ── Init ──
async function init() {
  await loadModels();
  await loadSessions();
}

async function loadModels() {
  var resp = await api('/api/chat/models');
  var data = await resp.json();
  var select = document.getElementById('model-select');
  var models = data.models || [];
  select.innerHTML = models.map(function(m) {
    return '<option value="' + m.id + '"' + (m.id === currentModel ? ' selected' : '') + '>' + m.id + ' (' + m.tier + ')</option>';
  }).join('');
}

function changeModel(m) { currentModel = m; }

// ── Sessions ──
async function loadSessions() {
  var resp = await api('/api/chat/sessions');
  var data = await resp.json();
  sessions = data.sessions || [];
  renderSessions();
}

function renderSessions() {
  var el = document.getElementById('session-list');
  if (!sessions.length) { el.innerHTML = '<div style="color:var(--text-muted);padding:1rem;text-align:center;font-size:.82rem">No chats yet</div>'; return; }
  el.innerHTML = sessions.map(function(s) {
    var active = currentSession && currentSession.id === s.id ? ' active' : '';
    return '<div class="sidebar-item' + active + '" onclick="loadSession(' + s.id + ')"><span>' + escHtml(s.title || 'Untitled').substring(0, 30) + '</span><span class="del" onclick="event.stopPropagation();deleteSession(' + s.id + ')">x</span></div>';
  }).join('');
}

async function newChat() {
  var resp = await api('/api/chat/sessions', { method: 'POST', body: JSON.stringify({ model: currentModel }) });
  var data = await resp.json();
  await loadSessions();
  loadSession(data.id);
}

async function loadSession(id) {
  var resp = await api('/api/chat/sessions/' + id);
  var data = await resp.json();
  currentSession = data.session;
  if (currentSession.model) { currentModel = currentSession.model; document.getElementById('model-select').value = currentModel; }
  renderMessages(data.messages || []);
  renderSessions();
}

async function deleteSession(id) {
  if (!confirm('Delete this chat?')) return;
  await api('/api/chat/sessions/' + id, { method: 'DELETE' });
  if (currentSession && currentSession.id === id) { currentSession = null; document.getElementById('messages').innerHTML = '<div class="empty-state"><h3>Start a conversation</h3></div>'; }
  loadSessions();
}

// ── Messages ──
function renderMessages(msgs) {
  var el = document.getElementById('messages');
  if (!msgs.length) { el.innerHTML = '<div class="empty-state" id="empty-state"><h3>Start a conversation</h3><p style="font-size:.85rem">Select a model and type a message</p></div>'; return; }
  el.innerHTML = msgs.map(function(m) { return renderMsg(m.role, m.content); }).join('');
  highlightAll();
  el.scrollTop = el.scrollHeight;
}

function renderMsg(role, content) {
  if (role === 'thinking') {
    return '<div class="msg msg-thinking"><div class="msg-bubble">' + renderMd(content) + '</div></div>';
  }
  if (role === 'user') {
    return '<div class="msg msg-user"><div class="msg-bubble">' + escHtml(content) + '</div></div>';
  }
  return '<div class="msg msg-assistant"><div class="msg-bubble">' + renderMd(content) + '</div></div>';
}

function renderMd(text) {
  if (!text) return '';
  try {
    var html = marked.parse(text);
    // Add copy buttons to code blocks
    html = html.replace(/<pre><code/g, '<pre><button class="copy-code" onclick="copyCodeBlock(this)">Copy</button><code');
    return html;
  } catch(e) { return escHtml(text); }
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function highlightAll() {
  document.querySelectorAll('.msg-bubble pre code').forEach(function(el) {
    hljs.highlightElement(el);
  });
}

function copyCodeBlock(btn) {
  var code = btn.nextElementSibling;
  navigator.clipboard.writeText(code.textContent).then(function() { btn.textContent = 'Copied!'; setTimeout(function() { btn.textContent = 'Copy'; }, 1500); });
}

// ── Send Message ──
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 200) + 'px';
}

async function sendMessage() {
  var input = document.getElementById('msg-input');
  var text = input.value.trim();
  if (!text && !pendingFiles.length) return;
  if (isStreaming) return;

  // Build content (text + files)
  var content = text;
  if (pendingFiles.length) {
    for (var i = 0; i < pendingFiles.length; i++) {
      var f = pendingFiles[i];
      if (f.type.startsWith('image/')) {
        content += '\n\n[Image: ' + f.name + ']';
      } else {
        content += '\n\n```' + (f.name.split('.').pop() || '') + '\n' + f.content + '\n```';
      }
    }
    pendingFiles = [];
    document.getElementById('file-preview').style.display = 'none';
  }

  // Create session if needed
  if (!currentSession) {
    var resp = await api('/api/chat/sessions', { method: 'POST', body: JSON.stringify({ model: currentModel, title: text.substring(0, 50) }) });
    var data = await resp.json();
    currentSession = { id: data.id, title: text.substring(0, 50), model: currentModel };
    await loadSessions();
  }

  // Show user message
  var msgsEl = document.getElementById('messages');
  var emptyState = document.getElementById('empty-state');
  if (emptyState) emptyState.remove();
  msgsEl.innerHTML += renderMsg('user', content);
  input.value = '';
  input.style.height = 'auto';

  // Build messages array from DOM (simplified — just use current session messages)
  var allMsgs = [];
  msgsEl.querySelectorAll('.msg').forEach(function(el) {
    if (el.classList.contains('msg-user')) {
      allMsgs.push({ role: 'user', content: el.querySelector('.msg-bubble').textContent });
    } else if (el.classList.contains('msg-assistant')) {
      allMsgs.push({ role: 'assistant', content: el.querySelector('.msg-bubble').textContent });
    }
  });

  // Stream response
  isStreaming = true;
  document.getElementById('send-btn').disabled = true;
  document.getElementById('stream-status').innerHTML = '<span class="streaming-dot"></span> Generating...';

  // Add assistant bubble placeholder
  msgsEl.innerHTML += '<div class="msg msg-assistant" id="streaming-msg"><div class="msg-bubble" id="streaming-content"><span class="streaming-dot"></span></div></div>';
  msgsEl.scrollTop = msgsEl.scrollHeight;

  var fullResponse = '';
  var thinkingResponse = '';

  try {
    abortController = new AbortController();
    var resp = await fetch('/api/chat/completions', {
      method: 'POST',
      headers: headers(),
      body: JSON.stringify({ session_id: currentSession.id, model: currentModel, messages: allMsgs, stream: true }),
      signal: abortController.signal,
    });

    // Check for HTTP errors before streaming
    if (!resp.ok) {
      var errText = await resp.text();
      try { var errJson = JSON.parse(errText); errText = errJson.error || errJson.detail || errText; } catch(e) {}
      fullResponse = '**Error ' + resp.status + ':** ' + errText;
      throw { name: 'HttpError', message: errText };
    }

    var reader = resp.body.getReader();
    var decoder = new TextDecoder();
    var buffer = '';

    while (true) {
      var result = await reader.read();
      if (result.done) break;
      buffer += decoder.decode(result.value, { stream: true });

      var lines = buffer.split('\n');
      buffer = lines.pop();

      for (var li = 0; li < lines.length; li++) {
        var line = lines[li].trim();
        if (!line || !line.startsWith('data: ')) continue;
        var payload = line.substring(6);
        if (payload === '[DONE]') continue;

        try {
          var chunk = JSON.parse(payload);
          // Check for error responses
          if (chunk.error) {
            var errMsg = typeof chunk.error === 'object' ? (chunk.error.message || JSON.stringify(chunk.error)) : chunk.error;
            fullResponse += '\n\n**Error:** ' + errMsg;
            break;
          }
          var choice = chunk.choices && chunk.choices[0];
          if (!choice) continue;
          // Check finish_reason for errors
          if (choice.finish_reason === 'error') {
            fullResponse += '\n\n**Error:** Model returned an error.';
            break;
          }
          var delta = choice.delta || {};
          if (delta.content) {
            fullResponse += delta.content;
          }
          if (delta.thinking) {
            thinkingResponse += delta.thinking;
          }
        } catch(pe) {
          // Non-JSON SSE line — might be an error message
          if (payload && payload.length > 2 && payload !== '[DONE]') {
            fullResponse += '\n\n**Error:** ' + payload;
          }
        }
      }

      // Update streaming bubble
      var streamEl = document.getElementById('streaming-content');
      if (streamEl) {
        var display = '';
        if (thinkingResponse) {
          display += '<div style="background:var(--thinking-bg);border:1px solid var(--thinking-border);border-radius:var(--radius-sm);padding:.5rem .75rem;margin-bottom:.75rem;font-size:.82rem;color:var(--text-dim);font-style:italic"><span style="font-size:.65rem;text-transform:uppercase;color:var(--text-muted)">thinking</span><br>' + renderMd(thinkingResponse) + '</div>';
        }
        display += renderMd(fullResponse) || '<span class="streaming-dot"></span>';
        streamEl.innerHTML = display;
        msgsEl.scrollTop = msgsEl.scrollHeight;
      }
    }
  } catch(e) {
    if (e.name !== 'AbortError' && e.name !== 'HttpError') {
      fullResponse += '\n\n**Error:** ' + (e.message || 'Connection failed');
    }
  }

  // Finalize
  isStreaming = false;
  abortController = null;
  document.getElementById('send-btn').disabled = false;
  document.getElementById('stream-status').textContent = '';

  var streamEl = document.getElementById('streaming-content');
  if (streamEl) {
    streamEl.innerHTML = renderMd(fullResponse) || '<em style="color:var(--red)">No response — model may be unavailable or all accounts exhausted. Try a different model.</em>';
    streamEl.removeAttribute('id');
  }
  var streamMsg = document.getElementById('streaming-msg');
  if (streamMsg) streamMsg.removeAttribute('id');

  highlightAll();
  msgsEl.scrollTop = msgsEl.scrollHeight;
}

// ── File Upload ──
function handleFileUpload(input) {
  var files = input.files;
  for (var i = 0; i < files.length; i++) {
    var file = files[i];
    if (file.type.startsWith('image/')) {
      var reader = new FileReader();
      reader.onload = (function(f) { return function(e) {
        pendingFiles.push({ name: f.name, type: f.type, content: e.target.result });
        showFilePreview();
      }; })(file);
      reader.readAsDataURL(file);
    } else {
      var reader = new FileReader();
      reader.onload = (function(f) { return function(e) {
        pendingFiles.push({ name: f.name, type: f.type, content: e.target.result });
        showFilePreview();
      }; })(file);
      reader.readAsText(file);
    }
  }
  input.value = '';
}

function showFilePreview() {
  var el = document.getElementById('file-preview');
  el.style.display = 'block';
  el.innerHTML = pendingFiles.map(function(f, i) {
    return '<span style="background:var(--surface3);padding:.2rem .5rem;border-radius:4px;margin-right:.3rem">' + f.name + ' <span style="cursor:pointer;color:var(--red)" onclick="removeFile(' + i + ')">x</span></span>';
  }).join('');
}

function removeFile(idx) {
  pendingFiles.splice(idx, 1);
  if (!pendingFiles.length) document.getElementById('file-preview').style.display = 'none';
  else showFilePreview();
}

// ── Export / Import ──
async function exportChats() {
  var resp = await api('/api/chat/export');
  var data = await resp.json();
  var blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = 'chat_export_' + new Date().toISOString().slice(0,10) + '.json';
  a.click(); URL.revokeObjectURL(url);
}

function importChats() { document.getElementById('import-input').click(); }

async function doImport(input) {
  var file = input.files[0];
  if (!file) return;
  var text = await file.text();
  var data = JSON.parse(text);
  await api('/api/chat/import', { method: 'POST', body: JSON.stringify(data) });
  input.value = '';
  loadSessions();
  alert('Imported ' + (data.sessions || []).length + ' sessions');
}

marked.setOptions({ breaks: true, gfm: true });
